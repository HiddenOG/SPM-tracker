services:
  - type: web
    name: spm-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python web/server.py
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
